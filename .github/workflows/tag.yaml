name: Tag

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag_job:
    runs-on: ubuntu-latest
    name: Tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Check for commits since latest tag
        id: has_changes
        run: |
          git fetch --no-tags origin +refs/tags/*:refs/tags/* || true
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$latest_tag" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            if git log "${latest_tag}"..HEAD --oneline | grep -q .; then
              echo "changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Auto-tag version
        if: steps.has_changes.outputs.changes == 'true'
        uses: cocogitto/cocogitto-action@v4
        id: tag
        with:
          command: bump
          args: --auto
          git-user: 'Cog Bot'
          git-user-email: 'cog@bot.ai'

      - name: Print tag
        if: steps.has_changes.outputs.changes == 'true'
        run: "echo 'tagged: ${{ steps.tag.outputs.version }}'"

      - name: No tag needed
        if: steps.has_changes.outputs.changes == 'false'
        run: echo "No commits since latest tag — skipping bump."
